name: Keep backend warm

# Pings the Fly.io backend on a schedule so a scale-to-zero machine is more
# likely to be already awake when a visitor arrives. This REDUCES the ~30s
# cold start; it does not eliminate it (GitHub cron is best-effort and can be
# delayed under load). For a hard guarantee, set min_machines_running = 1 in
# fly.toml instead (uses more always-on resources).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend root
        run: curl -fsS -m 30 https://nova-backend.fly.dev/ > /dev/null || true
